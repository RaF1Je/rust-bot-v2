services:
  - type: web
    name: rust-tracker-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: BM_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: CHECK_INTERVAL
        value: 60
